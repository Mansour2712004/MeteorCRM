<div class="flex h-screen bg-slate-950">
    <app-sidebar></app-sidebar>

    <div class="flex-1 ml-64 overflow-auto">

        <!-- Header -->
        <div class="bg-slate-900 border-b border-slate-700/50 px-8 py-5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-white text-xl font-bold">Tasks</h1>
                    <p class="text-slate-400 text-sm mt-0.5">Manage your
                        tasks</p>
                </div>
                <a routerLink="/tasks/new"
                    class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-all shadow-lg shadow-blue-500/20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    New Task
                </a>
            </div>
        </div>

        <!-- Content -->
        <div class="p-8">

            <!-- Loading -->
            <div *ngIf="isLoading"
                class="flex items-center justify-center py-20">
                <svg class="animate-spin w-8 h-8 text-blue-400" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10"
                        stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 22 6.477 22 12h-4z" />
                </svg>
            </div>

            <!-- Empty State -->
            <div *ngIf="!isLoading && tasks.length === 0"
                class="flex flex-col items-center justify-center py-20 text-center">
                <div
                    class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-slate-500" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                </div>
                <p class="text-slate-400 font-medium">No tasks yet</p>
                <p class="text-slate-500 text-sm mt-1">Create your first task to
                    get started</p>
                <a routerLink="/tasks/new"
                    class="mt-4 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all">
                    New Task
                </a>
            </div>

            <!-- Tasks List -->
            <div *ngIf="!isLoading && tasks.length > 0" class="space-y-3">
                <div *ngFor="let task of tasks"
                    class="bg-slate-900 border border-slate-700/50 rounded-2xl p-5 flex items-center gap-4 hover:border-slate-600/50 transition-all">

                    <!-- Checkbox -->
                    <button (click)="toggleComplete(task)"
                        class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all flex-shrink-0"
                        [class.border-blue-500]="task.isCompleted"
                        [class.bg-blue-500]="task.isCompleted"
                        [class.border-slate-500]="!task.isCompleted">
                        <svg *ngIf="task.isCompleted" class="w-3 h-3 text-white"
                            fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="3" d="M5 13l4 4L19 7" />
                        </svg>
                    </button>

                    <!-- Content -->
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-sm font-medium"
                            [class.line-through]="task.isCompleted"
                            [class.text-slate-500]="task.isCompleted">
                            {{ task.title }}
                        </p>
                        <div class="flex items-center gap-3 mt-1">
                            <span *ngIf="task.customerName"
                                class="text-slate-400 text-xs">{{
                                task.customerName }}</span>
                            <span *ngIf="task.dueDate"
                                class="text-slate-400 text-xs">Due: {{
                                task.dueDate | date:'MMM d' }}</span>
                        </div>
                    </div>

                    <!-- Priority -->
                    <span
                        class="px-2.5 py-1 rounded-full text-xs font-medium flex-shrink-0"
                        [ngClass]="{
                        'bg-red-400/10 text-red-400': task.priority === 'Critical',
                        'bg-yellow-400/10 text-yellow-400': task.priority === 'High',
                        'bg-blue-400/10 text-blue-400': task.priority === 'Medium',
                        'bg-slate-400/10 text-slate-400': task.priority === 'Low'
                        }">
                        {{ task.priority }}
                    </span>

                    <!-- Delete -->
                    <button (click)="deleteTask(task.id)"
                        class="text-slate-400 hover:text-red-400 transition-colors flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>

                </div>
            </div>

        </div>
    </div>
</div>
