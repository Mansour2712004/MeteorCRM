<div
    class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-500/30">
                <svg class="w-8 h-8 text-white" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Meteor<span
                    class="text-blue-400">CRM</span></h1>
            <p class="text-slate-400 mt-1 text-sm">Create your account</p>
        </div>

        <!-- Form Card -->
        <div
            class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-8 shadow-2xl">

            <!-- Error -->
            <div *ngIf="errorMessage"
                class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">
                {{ errorMessage }}
            </div>

            <form (ngSubmit)="onSubmit()">

                <!-- Name Row -->
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div>
                        <label
                            class="block text-slate-300 text-sm font-medium mb-2">First
                            Name</label>
                        <input
                            type="text"
                            [(ngModel)]="request.firstName"
                            name="firstName"
                            placeholder="John"
                            class="w-full bg-slate-700/50 border border-slate-600/50 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
                    </div>
                    <div>
                        <label
                            class="block text-slate-300 text-sm font-medium mb-2">Last
                            Name</label>
                        <input
                            type="text"
                            [(ngModel)]="request.lastName"
                            name="lastName"
                            placeholder="Doe"
                            class="w-full bg-slate-700/50 border border-slate-600/50 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-5">
                    <label
                        class="block text-slate-300 text-sm font-medium mb-2">Email
                        Address</label>
                    <input
                        type="email"
                        [(ngModel)]="request.email"
                        name="email"
                        placeholder="you@example.com"
                        class="w-full bg-slate-700/50 border border-slate-600/50 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
                </div>

                <!-- Password -->
                <div class="mb-5">
                    <label
                        class="block text-slate-300 text-sm font-medium mb-2">Password</label>
                    <div class="relative">
                        <input
                            [type]="showPassword ? 'text' : 'password'"
                            [(ngModel)]="request.password"
                            name="password"
                            placeholder="••••••••"
                            class="w-full bg-slate-700/50 border border-slate-600/50 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all pr-12" />
                        <button type="button"
                            (click)="showPassword = !showPassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors">
                            <svg *ngIf="!showPassword" class="w-5 h-5"
                                fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg *ngIf="showPassword" class="w-5 h-5"
                                fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-6">
                    <label
                        class="block text-slate-300 text-sm font-medium mb-2">Confirm
                        Password</label>
                    <input
                        type="password"
                        [(ngModel)]="request.confirmPassword"
                        name="confirmPassword"
                        placeholder="••••••••"
                        class="w-full bg-slate-700/50 border border-slate-600/50 text-white placeholder-slate-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
                </div>

                <!-- Submit -->
                <button
                    type="submit"
                    [disabled]="isLoading"
                    class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-blue-800 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-blue-500/20 text-sm">
                    <span *ngIf="!isLoading">Create Account</span>
                    <span *ngIf="isLoading"
                        class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-4 h-4" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10"
                                stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 22 6.477 22 12h-4z" />
                        </svg>
                        Creating account...
                    </span>
                </button>

            </form>

            <!-- Login Link -->
            <p class="text-center text-slate-400 text-sm mt-6">
                Already have an account?
                <a routerLink="/auth/login"
                    class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Sign
                    in</a>
            </p>

        </div>
    </div>
</div>
