<div class="flex h-screen bg-slate-950">

    <!-- Sidebar -->
    <app-sidebar></app-sidebar>

    <!-- Main Content -->
    <div class="flex-1 ml-64 overflow-auto">

        <!-- Header -->
        <div class="bg-slate-900 border-b border-slate-700/50 px-8 py-5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-white text-xl font-bold">Dashboard</h1>
                    <p class="text-slate-400 text-sm mt-0.5">Welcome back, {{
                        user?.firstName }}! 👋</p>
                </div>
                <div class="text-slate-400 text-sm">{{ today |
                    date:'EEEE, MMMM d' }}</div>
            </div>
        </div>

        <!-- Content -->
        <div class="p-8">

            <!-- Stats Cards -->
            <div class="grid grid-cols-4 gap-6 mb-8">

                <div
                    class="bg-slate-900 border border-slate-700/50 rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div
                            class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <span
                            class="text-green-400 text-xs font-medium bg-green-400/10 px-2 py-1 rounded-full">+12%</span>
                    </div>
                    <p class="text-slate-400 text-sm">Total Customers</p>
                    <p class="text-white text-2xl font-bold mt-1">0</p>
                </div>

                <div
                    class="bg-slate-900 border border-slate-700/50 rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div
                            class="w-10 h-10 bg-purple-600/20 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-purple-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                            </svg>
                        </div>
                        <span
                            class="text-green-400 text-xs font-medium bg-green-400/10 px-2 py-1 rounded-full">+8%</span>
                    </div>
                    <p class="text-slate-400 text-sm">Active Deals</p>
                    <p class="text-white text-2xl font-bold mt-1">0</p>
                </div>

                <div
                    class="bg-slate-900 border border-slate-700/50 rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div
                            class="w-10 h-10 bg-yellow-600/20 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-yellow-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                        </div>
                        <span
                            class="text-red-400 text-xs font-medium bg-red-400/10 px-2 py-1 rounded-full">3
                            due</span>
                    </div>
                    <p class="text-slate-400 text-sm">Pending Tasks</p>
                    <p class="text-white text-2xl font-bold mt-1">0</p>
                </div>

                <div
                    class="bg-slate-900 border border-slate-700/50 rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div
                            class="w-10 h-10 bg-green-600/20 rounded-xl flex items-center justify-center">
                            <svg class="w-5 h-5 text-green-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <span
                            class="text-green-400 text-xs font-medium bg-green-400/10 px-2 py-1 rounded-full">+24%</span>
                    </div>
                    <p class="text-slate-400 text-sm">Revenue</p>
                    <p class="text-white text-2xl font-bold mt-1">$0</p>
                </div>

            </div>

            <!-- Quick Actions -->
            <div
                class="bg-slate-900 border border-slate-700/50 rounded-2xl p-6">
                <h2 class="text-white font-semibold mb-4">Quick Actions</h2>
                <div class="grid grid-cols-3 gap-4">
                    <a routerLink="/customers"
                        class="flex items-center gap-3 p-4 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all cursor-pointer">
                        <div
                            class="w-8 h-8 bg-blue-600/20 rounded-lg flex items-center justify-center">
                            <svg class="w-4 h-4 text-blue-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                        <span class="text-slate-300 text-sm font-medium">Add
                            Customer</span>
                    </a>
                    <a routerLink="/deals"
                        class="flex items-center gap-3 p-4 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all cursor-pointer">
                        <div
                            class="w-8 h-8 bg-purple-600/20 rounded-lg flex items-center justify-center">
                            <svg class="w-4 h-4 text-purple-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                        <span class="text-slate-300 text-sm font-medium">New
                            Deal</span>
                    </a>
                    <a routerLink="/tasks"
                        class="flex items-center gap-3 p-4 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all cursor-pointer">
                        <div
                            class="w-8 h-8 bg-yellow-600/20 rounded-lg flex items-center justify-center">
                            <svg class="w-4 h-4 text-yellow-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                        <span class="text-slate-300 text-sm font-medium">Create
                            Task</span>
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
